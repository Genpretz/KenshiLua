# KenshiLua Configuration File
# ----------------------------

# Set to true to run the benchmark system on game startup and log results to KenshiLua_Benchmark.log
enable_benchmark=false

# Set to true to enable verbose debug logging
debug_logging=false

# Keyboard shortcut to toggle the developer GUI.
# Available keys: KC_A to KC_Z, KC_F1 to KC_F12, KC_1 to KC_0, escape, tab, return, space, etc.
# Examples: toggle_gui_key=KC_L, toggle_gui_key=L
toggle_gui_key=KC_L

# GUI toggle modifier key configurations
toggle_gui_ctrl=true
toggle_gui_shift=true
toggle_gui_alt=false

